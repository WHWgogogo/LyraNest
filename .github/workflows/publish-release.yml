name: Publish LyraNest release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SOURCE_DIR="releases/${VERSION}"
          test -f "${SOURCE_DIR}/LyraNest-Android-arm64-${VERSION}.apk"
          test -f "${SOURCE_DIR}/LyraNest-Windows-x64-${VERSION}.zip"
          mkdir -p release-assets
          cp "${SOURCE_DIR}/LyraNest-Android-arm64-${VERSION}.apk" release-assets/LyraNest-Android-arm64.apk
          cp "${SOURCE_DIR}/LyraNest-Windows-x64-${VERSION}.zip" release-assets/LyraNest-Windows-x64.zip
          cp docker-compose.yml release-assets/docker-compose.yml
          cp .env.example release-assets/LyraNest.env.example
          (
            cd release-assets
            sha256sum LyraNest-Android-arm64.apk LyraNest-Windows-x64.zip docker-compose.yml LyraNest.env.example > SHA256SUMS.txt
          )
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --verify-tag \
            --latest \
            --title "LyraNest ${VERSION}" \
            --notes-file "releases/${VERSION}/CHANGELOG.md"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/whwgogogo/lyranest:${{ steps.version.outputs.value }}
            ghcr.io/whwgogogo/lyranest:latest
